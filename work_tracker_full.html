<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Tracker Pro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;background:#f5f5f3;color:#1a1a1a;font-size:15px;line-height:1.5}
.container{max-width:820px;margin:0 auto;padding:20px 16px}
.top-bar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px;gap:10px}
h1{font-size:21px;font-weight:500}
.subtitle{font-size:13px;color:#888;margin-bottom:20px}
.lang-toggle{display:flex;border:1px solid #d0d0d0;border-radius:8px;overflow:hidden;flex-shrink:0}
.lang-btn{padding:5px 13px;font-size:13px;cursor:pointer;border:none;background:#fff;color:#666;font-family:inherit;transition:all .15s}
.lang-btn.active{background:#1a1a1a;color:#fff}

/* stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px}
.stat-card{background:#fff;border-radius:10px;padding:12px 14px;border:0.5px solid #e5e5e5}
.stat-label{font-size:11px;color:#888;margin-bottom:3px}
.stat-value{font-size:24px;font-weight:500;color:#1a1a1a}

/* urgent strip */
.urgent-strip{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:14px 16px;margin-bottom:18px}
.strip-title{font-size:13px;font-weight:500;color:#1a1a1a;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.strip-dot{width:8px;height:8px;border-radius:50%;background:#cc3333;flex-shrink:0}
.urgent-list{display:flex;flex-direction:column;gap:6px}
.urgent-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;background:#fafaf8;border:0.5px solid #eee;font-size:13px}
.urgent-item .u-sec{font-size:11px;color:#888;min-width:70px}
.urgent-item .u-name{flex:1;color:#1a1a1a}
.urgent-item .u-dl{font-size:11px;padding:2px 7px;border-radius:8px}
.u-dl.overdue{background:#fff0f0;color:#cc3333}
.u-dl.soon{background:#fff8ec;color:#996600}
.u-dl.high-p{background:#f0eeff;color:#5544cc}
.no-urgent{font-size:13px;color:#bbb;padding:4px 0}

/* tabs */
.tabs{display:flex;gap:5px;margin-bottom:18px;flex-wrap:wrap}
.tab{padding:7px 14px;border-radius:20px;border:1px solid #d5d5d5;font-size:13px;cursor:pointer;background:#fff;color:#666;transition:all .15s;font-family:inherit}
.tab.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.section{display:none}.section.active{display:block}

/* progress */
.prog-label{font-size:12px;color:#888;margin-bottom:4px;display:flex;justify-content:space-between}
.progress-bar-wrap{height:4px;border-radius:2px;background:#e8e8e8;margin-bottom:18px}
.progress-bar{height:4px;border-radius:2px;transition:width .3s}

/* filter */
.filter-row{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filter-label{font-size:12px;color:#888}
.filter-btn{padding:4px 10px;border-radius:12px;border:1px solid #e0e0e0;font-size:12px;cursor:pointer;background:#fff;color:#666;font-family:inherit}
.filter-btn.active{background:#f0f0ee;border-color:#c0c0c0;color:#1a1a1a;font-weight:500}

/* category */
.category{margin-bottom:14px;border:1px solid #e5e5e5;border-radius:12px;overflow:hidden}
.cat-header{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#f8f8f6}
.cat-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.cat-title{font-size:14px;font-weight:500;color:#1a1a1a}
.cat-count{font-size:11px;color:#888;margin-left:auto}
.del-cat-btn{font-size:11px;color:#bbb;cursor:pointer;padding:2px 8px;border-radius:4px;border:1px solid #e8e8e8;background:transparent;font-family:inherit;margin-left:6px}
.del-cat-btn:hover{background:#fff0f0;color:#cc3333;border-color:#f0a0a0}
.task-list{display:flex;flex-direction:column}
.task{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-top:1px solid #f0f0ee;background:#fff}
.task:hover{background:#fafaf8}
.task.done{opacity:.42}
.task-check{width:18px;height:18px;border-radius:50%;border:1.5px solid #c0c0c0;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-top:2px;transition:all .15s}
.task.done .task-check{background:#1a1a1a;border-color:#1a1a1a}
.chk-svg{display:none}.task.done .chk-svg{display:block}
.task-body{flex:1;min-width:0}
.task-name{font-size:13px;color:#1a1a1a;line-height:1.4}
.task.done .task-name{text-decoration:line-through;color:#bbb}
.task-note{font-size:12px;color:#888;margin-top:3px;font-style:italic;line-height:1.4}
.task-meta{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;align-items:center}
.pill{font-size:11px;padding:2px 8px;border-radius:9px;font-weight:500}
.p-high{background:#fff0f0;color:#cc3333}
.p-med{background:#fff8ec;color:#996600}
.p-low{background:#f0f8ec;color:#336622}
.tag-type{background:#f0eeff;color:#5544cc}
.dl-pill{background:#f2f2f2;color:#666;font-size:11px;padding:2px 8px;border-radius:9px}
.dl-pill.overdue{background:#fff0f0;color:#cc3333}
.dl-pill.soon{background:#fff8ec;color:#996600}
.task-actions{display:flex;gap:4px;flex-shrink:0;align-self:flex-start}
.icon-btn{font-size:11px;color:#bbb;cursor:pointer;padding:2px 6px;border-radius:4px;border:none;background:transparent;font-family:inherit}
.icon-btn:hover{color:#555;background:#f0f0ee}
.icon-btn.del:hover{color:#cc3333;background:#fff0f0}
.note-input-wrap{padding:8px 14px;border-top:1px solid #f0f0ee;background:#fafaf8}
.note-input-wrap textarea{width:100%;padding:7px 9px;border-radius:7px;border:1px solid #d8d8d8;font-size:12px;font-family:inherit;resize:none;color:#1a1a1a;background:#fff;height:56px}
.note-input-wrap textarea:focus{outline:none;border-color:#888}
.note-btns{display:flex;gap:6px;margin-top:5px}

/* forms */
.cat-footer{padding:8px 14px;border-top:1px solid #f0f0ee;background:#fff}
.add-task-btn{border:none;background:transparent;color:#888;font-size:12px;cursor:pointer;font-family:inherit;padding:0}
.add-task-btn:hover{color:#1a1a1a}
.add-panel{padding:12px 14px;border-top:1px solid #d0d0d0;background:#f8f8f6}
.add-panel-title{font-size:12px;font-weight:500;color:#555;margin-bottom:8px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:7px}
.form-row.single{grid-template-columns:1fr}
.form-row.three{grid-template-columns:1fr 1fr 1fr;gap:5px}
.form-row.four{grid-template-columns:1fr 1fr 1fr 1fr;gap:5px}
.form-label{font-size:11px;color:#888;margin-bottom:2px}
input[type=text],input[type=date],input[type=number],select,textarea{width:100%;padding:7px 9px;border-radius:7px;border:1px solid #d0d0d0;background:#fff;color:#1a1a1a;font-size:12px;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:#888}
.btn-row{display:flex;gap:6px;margin-top:5px}
.btn-primary{padding:7px 14px;border-radius:7px;border:none;background:#1a1a1a;color:#fff;font-size:12px;cursor:pointer;font-family:inherit}
.btn-primary:hover{background:#333}
.btn-ghost{padding:7px 12px;border-radius:7px;border:1px solid #d0d0d0;background:transparent;color:#666;font-size:12px;cursor:pointer;font-family:inherit}
.btn-ghost:hover{background:#f0f0ee}
.btn-sm{padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit;border:1px solid #d0d0d0;background:#fff;color:#555}
.btn-sm:hover{background:#f0f0ee}
.btn-sm.save{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.section-footer{margin-top:8px}
.add-cat-btn{width:100%;padding:10px 14px;border-radius:11px;border:1px dashed #c0c0c0;background:transparent;color:#888;font-size:13px;cursor:pointer;text-align:left;font-family:inherit}
.add-cat-btn:hover{background:#f8f8f6;color:#1a1a1a}
.new-cat-panel{border:1px solid #d0d0d0;border-radius:11px;padding:14px;background:#f8f8f6;margin-top:8px}
.new-cat-title{font-size:13px;font-weight:500;color:#1a1a1a;margin-bottom:10px}

/* weekly view */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:18px}
.week-day{border:1px solid #e5e5e5;border-radius:10px;overflow:hidden;background:#fff;min-height:120px}
.week-day-header{padding:7px 8px;background:#f8f8f6;font-size:12px;font-weight:500;color:#1a1a1a;text-align:center;border-bottom:1px solid #eee}
.week-day-header.today-hdr{background:#1a1a1a;color:#fff}
.week-tasks{padding:6px;display:flex;flex-direction:column;gap:3px}
.week-task{font-size:10px;padding:3px 6px;border-radius:5px;border-left:2px solid #ccc;background:#f8f8f8;color:#444;line-height:1.3;cursor:pointer}
.week-task.done-w{opacity:.45;text-decoration:line-through}
.week-empty{font-size:10px;color:#ccc;padding:6px;text-align:center}

/* overview */
.ov-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ov-card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:14px;cursor:pointer}
.ov-card:hover{border-color:#c0c0c0}
.ov-title{font-size:13px;font-weight:500;color:#1a1a1a;margin-bottom:7px;display:flex;align-items:center;gap:7px}
.ov-bar-wrap{height:5px;border-radius:3px;background:#eee;margin-bottom:7px}
.ov-bar{height:5px;border-radius:3px;transition:width .3s}
.ov-meta{font-size:12px;color:#888}
.empty-task{padding:10px 14px;font-size:13px;color:#ccc;border-top:1px solid #f0f0ee;background:#fff}

/* health tracker */
.health-section{display:flex;flex-direction:column;gap:14px}
.health-card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;overflow:hidden}
.health-card-header{padding:10px 14px;background:#f8f8f6;font-size:13px;font-weight:500;color:#1a1a1a;display:flex;align-items:center;gap:8px}
.health-card-body{padding:14px}
.streak-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.streak-dot{width:26px;height:26px;border-radius:50%;border:1.5px solid #e0e0e0;display:flex;align-items:center;justify-content:center;font-size:10px;color:#bbb;cursor:pointer;background:#fff;transition:all .15s}
.streak-dot.done-s{background:#1a1a1a;border-color:#1a1a1a;color:#fff}
.streak-dot.today-s{border-color:#888;color:#555;font-weight:500}
.weight-log{display:flex;flex-direction:column;gap:6px}
.weight-entry{display:flex;align-items:center;gap:8px;font-size:13px}
.weight-date{color:#888;min-width:80px;font-size:12px}
.weight-val{font-weight:500;color:#1a1a1a}
.weight-diff{font-size:11px;padding:1px 6px;border-radius:6px}
.w-down{background:#f0f8ec;color:#336622}
.w-up{background:#fff0f0;color:#cc3333}
.w-same{background:#f2f2f2;color:#888}
.habit-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.habit-item{text-align:center;padding:10px 6px;border:1px solid #eee;border-radius:10px;cursor:pointer;transition:all .15s}
.habit-item.done-h{background:#f0f8f0;border-color:#a0d0a0}
.habit-label{font-size:11px;color:#888;margin-top:4px}
.habit-streak{font-size:12px;font-weight:500;color:#1a1a1a}

/* investment */
.inv-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.inv-card{background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:12px 14px}
.inv-list{display:flex;flex-direction:column;gap:8px}
.inv-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid #eee;border-radius:10px;background:#fff}
.inv-name{font-size:13px;font-weight:500;color:#1a1a1a;flex:1}
.inv-amount{font-size:13px;color:#1a1a1a;font-weight:500;text-align:right}
.inv-return{font-size:11px;padding:2px 7px;border-radius:7px;text-align:right;margin-top:2px}
.r-pos{background:#f0f8ec;color:#336622}
.r-neg{background:#fff0f0;color:#cc3333}
.r-neu{background:#f2f2f2;color:#888}
.inv-del{font-size:11px;color:#ccc;cursor:pointer;border:none;background:transparent;font-family:inherit;padding:2px 6px}
.inv-del:hover{color:#cc3333}

/* learning */
.learn-list{display:flex;flex-direction:column;gap:8px}
.learn-item{padding:12px 14px;border:1px solid #eee;border-radius:10px;background:#fff}
.learn-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.learn-name{font-size:13px;font-weight:500;color:#1a1a1a;flex:1}
.learn-cat{font-size:11px;padding:2px 7px;border-radius:7px;background:#f0eeff;color:#5544cc}
.learn-prog-wrap{height:5px;border-radius:3px;background:#eee;margin-bottom:5px}
.learn-prog{height:5px;border-radius:3px;background:#5544cc;transition:width .3s}
.learn-meta{font-size:11px;color:#888;display:flex;justify-content:space-between}
.learn-del{font-size:11px;color:#ccc;cursor:pointer;border:none;background:transparent;font-family:inherit}
.learn-del:hover{color:#cc3333}

/* export */
.export-box{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:16px;margin-bottom:16px}
.export-title{font-size:14px;font-weight:500;color:#1a1a1a;margin-bottom:12px}
.export-preview{background:#f8f8f6;border-radius:8px;padding:12px;font-size:12px;color:#555;font-family:monospace;line-height:1.7;margin-bottom:10px;white-space:pre-wrap;max-height:300px;overflow-y:auto}
.copy-badge{font-size:11px;color:#336622;background:#f0f8ec;padding:3px 9px;border-radius:6px;display:none}

@media(max-width:540px){
  .stats{grid-template-columns:1fr 1fr}
  .form-row.three,.form-row.four{grid-template-columns:1fr 1fr}
  .ov-grid{grid-template-columns:1fr}
  .week-grid{grid-template-columns:repeat(4,1fr)}
  .inv-summary{grid-template-columns:1fr 1fr}
  .habit-grid{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>

/* helpers */
const catName=c=>lang==='th'?c.nameTh:c.nameEn;
const taskName=tk=>lang==='th'?tk.nameTh:tk.nameEn;
const secLabel=s=>lang==='th'?s.labelTh:s.labelEn;
const pLabel=p=>p==='high'?t('pHigh'):p==='med'?t('pMed'):t('pLow');
const tyLabel=tp=>({weekly:t('typeWeekly'),ongoing:t('typeOngoing'),urgent:t('typeUrgent'),plan:t('typePlan'),self:t('typeSelf')}[tp]||tp);
const dlDiff=dl=>dl?Math.ceil((new Date(dl)-new Date(todayStr()))/(864e5)):null;
const dlStatus=dl=>{const d=dlDiff(dl);if(d===null)return null;return d<0?'overdue':d<=3?'soon':'ok'};
const dlLabel=dl=>{
  if(!dl)return null;const d=dlDiff(dl);
  if(d<0)return t('overdue')+(lang==='th'?`${Math.abs(d)} วัน`:`${Math.abs(d)}d`);
  if(d===0)return t('today');if(d===1)return t('tomorrow');
  return lang==='th'?`${d} วัน`:`${d}${t('daysLeft')}`;
};
const getDone=sec=>{let d=0,tot=0;sec.categories.forEach(c=>c.tasks.forEach(tk=>{tot++;if(tk.done)d++}));return{d,t:tot}};
const getAllStats=()=>{let d=0,tot=0;Object.values(data.sections).forEach(s=>{const c=getDone(s);d+=c.d;tot+=c.t});return{d,t:tot}};
const chkSVG=()=>`<svg class="chk-svg" width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
const fmt=n=>Number(n).toLocaleString('th-TH');
const fmtDate=d=>{if(!d)return'';try{return new Date(d).toLocaleDateString(lang==='th'?'th-TH':'en-GB',{day:'numeric',month:'short'})}catch{return d}};

  document.getElementById('stats').innerHTML=`

    <div class="stat-card"><div class="stat-label">${t('remaining')}</div><div class="stat-value">${tot-d}</div></div>
    <div class="stat-card"><div class="stat-label">${t('progress')}</div><div class="stat-value">${tot?Math.round(d/tot*100):0}%</div></div>`;
}

function renderUrgent(){
  const strip=document.getElementById('urgent-strip');
  const urgent=[];
  Object.entries(data.sections).forEach(([key,sec])=>{
    sec.categories.forEach(cat=>{
      cat.tasks.forEach(tk=>{
        if(tk.done)return;
        const ds=dlStatus(tk.deadline);
        const isUrgent=tk.priority==='high'||ds==='overdue'||ds==='soon';
        if(isUrgent)urgent.push({key,tk,sec,ds});
      });
    });
  });
  urgent.sort((a,b)=>{
    const order={overdue:0,soon:1,null:2,ok:3};
    return(order[a.ds]||2)-(order[b.ds]||2);
  });
  const items=urgent.slice(0,6).map(({key,tk,sec,ds})=>{
    const dl=dlLabel(tk.deadline);
    const dlCls=ds==='overdue'?'overdue':ds==='soon'?'soon':'high-p';
    return `<div class="urgent-item">
      <span class="u-sec" style="color:${sec.color}">${secLabel(sec)}</span>
      <span class="u-name">${taskName(tk)}</span>
      ${dl?`<span class="u-dl ${dlCls}">${dl}</span>`:`<span class="u-dl high-p">${t('pHigh')}</span>`}
    </div>`;
  }).join('');
  strip.innerHTML=`<div class="urgent-strip">
    <div class="strip-title"><div class="strip-dot"></div>${t('urgentTitle')}</div>
    <div class="urgent-list">${urgent.length?items:`<div class="no-urgent">${t('noUrgent')}</div>`}</div>
  </div>`;
}

function renderSection(key){

  let html=`<div class="filter-row">
    <span class="filter-label">${t('filterPriority')}</span>
    ${['all','high','med','low'].map(f=>`<button class="filter-btn ${filt===f?'active':''}" onclick="setFilter('${key}','${f}')">${t(f==='all'?'all':f==='high'?'high':f==='med'?'med':'low')}</button>`).join('')}
  </div>
  <div class="prog-label"><span>${d}${t('progressOf')}${tot}${t('progressDone')}</span><span>${pct}%</span></div>
  <div class="progress-bar-wrap"><div class="progress-bar" style="width:${pct}%;background:${sec.color}"></div></div>`;

  sec.categories.forEach((cat,ci)=>{
    const tasks=filt==='all'?cat.tasks:cat.tasks.filter(tk=>tk.priority===filt);
    const catDone=tasks.filter(tk=>tk.done).length;
    html+=`<div class="category">
      <div class="cat-header">
        <div class="cat-dot" style="background:${sec.color}"></div>
        <span class="cat-title">${catName(cat)}</span>
        <span class="cat-count">${catDone}/${tasks.length}</span>
        <button class="del-cat-btn" onclick="deleteCat('${key}','${cat.id}')">${t('deleteCat')}</button>
      </div>
      <div class="task-list">`;
    if(!tasks.length){
      html+=`<div class="empty-task">${t('noTask')}${filt!=='all'?t('noTaskFilter'):''}</div>`;
    } else {
      tasks.forEach(tk=>{
        const ds=dlStatus(tk.deadline);
        const dl=dlLabel(tk.deadline);
        const nfk='note_'+tk.id;
        html+=`<div class="task ${tk.done?'done':''}">
          <div class="task-check" onclick="toggleTask('${key}',${ci},'${tk.id}')">${chkSVG()}</div>
          <div class="task-body">
            <div class="task-name">${taskName(tk)}</div>
            ${tk.note?`<div class="task-note">${tk.note}</div>`:''}
            <div class="task-meta">
              <span class="pill p-${tk.priority}">${pLabel(tk.priority)}</span>
              <span class="pill tag-type">${tyLabel(tk.type)}</span>
              ${dl?`<span class="dl-pill ${ds||''}">${dl}</span>`:''}
            </div>
          </div>
          <div class="task-actions">
            <button class="icon-btn" onclick="toggleNoteForm('${nfk}','${key}')">${t('addNote')}</button>
            <button class="icon-btn del" onclick="deleteTask('${key}',${ci},'${tk.id}')">${t('deleteTask')}</button>
          </div>
        </div>`;
        if(noteForms[nfk]){
          html+=`<div class="note-input-wrap">
            <textarea id="ta_${nfk}" placeholder="${t('noteL')}">${tk.note||''}</textarea>
            <div class="note-btns">
              <button class="btn-sm save" onclick="saveNote('${key}',${ci},'${tk.id}','${nfk}')">${t('saveNote')}</button>
              <button class="btn-sm" onclick="toggleNoteForm('${nfk}','${key}')">${t('cancelNote')}</button>
            </div>
          </div>`;
        }
      });
    }
    html+=`</div>`;
    const tfk=key+'_cat_'+cat.id;
    if(taskForms[tfk]){
      html+=`<div class="add-panel">
        <div class="add-panel-title">${t('addTaskTitle')}</div>
        <div class="form-row single"><div><div class="form-label">${t('taskName')}</div><input type="text" id="nm_${tfk}" placeholder="${t('taskNamePH')}"></div></div>
        <div class="form-row three">
          <div><div class="form-label">${t('priorityL')}</div><select id="pr_${tfk}"><option value="high">${t('pHigh')}</option><option value="med" selected>${t('pMed')}</option><option value="low">${t('pLow')}</option></select></div>
          <div><div class="form-label">${t('typeL')}</div><select id="tp_${tfk}"><option value="weekly">${t('typeWeekly')}</option><option value="ongoing">${t('typeOngoing')}</option><option value="urgent">${t('typeUrgent')}</option><option value="plan">${t('typePlan')}</option><option value="self">${t('typeSelf')}</option></select></div>
          <div><div class="form-label">${t('deadlineL')}</div><input type="date" id="dl_${tfk}" min="${todayStr()}"></div>
        </div>

      html+=`<div class="cat-footer"><button class="add-task-btn" onclick="showTaskForm('${tfk}')">${t('addTask')}</button></div>`;

function renderWeekly(){
  const el=document.getElementById('tab-weekly');
  if(!el)return;
  const week=days7();
  const today=todayStr();
  const dn=t('dayNames');
  let allTasks=[];
  Object.entries(data.sections).forEach(([key,sec])=>{
    sec.categories.forEach(cat=>{
      cat.tasks.forEach(tk=>{
        allTasks.push({...tk,secKey:key,secColor:sec.color,secLabel:secLabel(sec)});
      });
    });
  });
  const weeklyTasks=allTasks.filter(tk=>tk.type==='weekly'&&!tk.done);
  const byDeadline=allTasks.filter(tk=>tk.deadline&&week.includes(tk.deadline)&&!tk.done);
  let html=`<div style="font-size:12px;color:#888;margin-bottom:10px">${lang==='th'?'งานรายสัปดาห์ + งานที่มี deadline สัปดาห์นี้':'Weekly tasks + tasks due this week'}</div>`;
  html+=`<div class="week-grid">`;
  week.forEach((d,i)=>{
    const isToday=d===today;
    const dayLabel=dn[new Date(d).getDay()];
    const dayNum=new Date(d).getDate();
    const dlTasks=byDeadline.filter(tk=>tk.deadline===d);
    html+=`<div class="week-day">
      <div class="week-day-header ${isToday?'today-hdr':''}">${dayLabel}<br><span style="font-size:13px">${dayNum}</span></div>
      <div class="week-tasks">`;
    if(isToday&&weeklyTasks.length){
      weeklyTasks.slice(0,3).forEach(tk=>{
        html+=`<div class="week-task" style="border-left-color:${tk.secColor}">${taskName(tk)}</div>`;
      });
      if(weeklyTasks.length>3)html+=`<div style="font-size:10px;color:#bbb;padding:2px 6px">+${weeklyTasks.length-3} more</div>`;
    }
    dlTasks.forEach(tk=>{
      html+=`<div class="week-task" style="border-left-color:${tk.secColor};background:#fff8ec">${taskName(tk)}</div>`;
    });
    if(!isToday&&!dlTasks.length)html+=`<div class="week-empty">${t('noWeekTasks')}</div>`;
    html+=`</div></div>`;
  });
  html+=`</div>`;
  el.innerHTML=html;
}

function renderHealth(){
  const el=document.getElementById('tab-self');
  if(!el)return;
  const sec=data.sections.self;
  const{d,t:tot}=getDone(sec);
  const pct=tot?Math.round(d/tot*100):0;
  const filt=filterState['self']||'all';
  let html=`<div class="filter-row">
    <span class="filter-label">${t('filterPriority')}</span>
    ${['all','high','med','low'].map(f=>`<button class="filter-btn ${filt===f?'active':''}" onclick="setFilter('self','${f}')">${t(f==='all'?'all':f==='high'?'high':f==='med'?'med':'low')}</button>`).join('')}
  </div>
  <div class="prog-label"><span>${d}${t('progressOf')}${tot}${t('progressDone')}</span><span>${pct}%</span></div>
  <div class="progress-bar-wrap"><div class="progress-bar" style="width:${pct}%;background:${sec.color}"></div></div>`;

  sec.categories.forEach((cat,ci)=>{
    const tasks=filt==='all'?cat.tasks:cat.tasks.filter(tk=>tk.priority===filt);
    const catDone=tasks.filter(tk=>tk.done).length;
    html+=`<div class="category">
      <div class="cat-header">
        <div class="cat-dot" style="background:${sec.color}"></div>
        <span class="cat-title">${catName(cat)}</span>
        <span class="cat-count">${catDone}/${tasks.length}</span>
        <button class="del-cat-btn" onclick="deleteCat('self','${cat.id}')">${t('deleteCat')}</button>
      </div>
      <div class="task-list">`;
    if(!tasks.length){html+=`<div class="empty-task">${t('noTask')}</div>`;}
    else tasks.forEach(tk=>{
      const ds=dlStatus(tk.deadline);const dl=dlLabel(tk.deadline);
      html+=`<div class="task ${tk.done?'done':''}">
        <div class="task-check" onclick="toggleTask('self',${ci},'${tk.id}')">${chkSVG()}</div>
        <div class="task-body">
          <div class="task-name">${taskName(tk)}</div>
          ${tk.note?`<div class="task-note">${tk.note}</div>`:''}
          <div class="task-meta">
            <span class="pill p-${tk.priority}">${pLabel(tk.priority)}</span>
            ${dl?`<span class="dl-pill ${ds||''}">${dl}</span>`:''}
          </div>
        </div>
        <div class="task-actions"><button class="icon-btn del" onclick="deleteTask('self',${ci},'${tk.id}')">${t('deleteTask')}</button></div>
      </div>`;
    });
    html+=`</div>`;
    const tfk='self_cat_'+cat.id;
    if(taskForms[tfk]){
      html+=`<div class="add-panel"><div class="add-panel-title">${t('addTaskTitle')}</div>
        <div class="form-row single"><div><div class="form-label">${t('taskName')}</div><input type="text" id="nm_${tfk}" placeholder="${t('taskNamePH')}"></div></div>
        <div class="form-row"><div><div class="form-label">${t('priorityL')}</div><select id="pr_${tfk}"><option value="high">${t('pHigh')}</option><option value="med" selected>${t('pMed')}</option><option value="low">${t('pLow')}</option></select></div>
        <div><div class="form-label">${t('deadlineL')}</div><input type="date" id="dl_${tfk}" min="${todayStr()}"></div></div>
        <div class="btn-row"><button class="btn-primary" onclick="addTask('self',${ci},'${tfk}')">${t('addBtn')}</button><button class="btn-ghost" onclick="hideTaskForm('${tfk}')">${t('cancelBtn')}</button></div>
      </div>`;
    } else {
      html+=`<div class="cat-footer"><button class="add-task-btn" onclick="showTaskForm('${tfk}')">${t('addTask')}</button></div>`;
    }
    html+=`</div>`;
  });

  const cfk='catform_self';
  if(catForms[cfk]){
    html+=`<div class="new-cat-panel"><div class="new-cat-title">${t('addCatTitle')}</div>
      <div class="form-row single" style="margin-bottom:10px"><div><div class="form-label">${t('catNameL')}</div><input type="text" id="cn_${cfk}" placeholder="${t('catNamePH')}"></div></div>
      <div class="btn-row"><button class="btn-primary" onclick="addCat('self','${cfk}')">${t('addCatBtn')}</button><button class="btn-ghost" onclick="hideCatForm('${cfk}')">${t('cancelBtn')}</button></div>
    </div>`;
  } else {
    html+=`<button class="add-cat-btn" onclick="showCatForm('${cfk}')">${t('addCat')}</button>`;
  }

  /* habit tracker */
  const week=days7();const today=todayStr();const habits=t('habits');
  html+=`<div class="health-section" style="margin-top:16px">
  <div class="health-card">
    <div class="health-card-header">${t('habitTracker')}</div>
    <div class="health-card-body">
      <div class="habit-grid">`;
  habits.forEach((h,hi)=>{
    const streak=calcStreak(hi);
    const todayDone=!!(data.health.habitDays[today]&&data.health.habitDays[today][hi]);
    html+=`<div class="habit-item ${todayDone?'done-h':''}" onclick="toggleHabit(${hi})">
      <div style="font-size:13px;font-weight:500;color:#1a1a1a">${h}</div>
      <div class="habit-label">${t('habitStreakLabel')}</div>
      <div class="habit-streak">${streak}</div>
    </div>`;
  });
  html+=`</div></div></div>`;

  /* weight log */
  const wlog=data.health.weightLog.slice(-7);
  html+=`<div class="health-card">
    <div class="health-card-header">${t('weightLog')}</div>
    <div class="health-card-body">
      <div class="weight-log">`;
  wlog.forEach((w,i)=>{
    const prev=i>0?wlog[i-1].val:null;
    const diff=prev?+(w.val-prev).toFixed(1):null;
    const cls=diff===null?'w-same':diff<0?'w-down':diff>0?'w-up':'w-same';
    const sign=diff===null?'':diff>0?'+':'';
    html+=`<div class="weight-entry">
      <span class="weight-date">${fmtDate(w.date)}</span>
      <span class="weight-val">${w.val} kg</span>
      ${diff!==null?`<span class="weight-diff ${cls}">${sign}${diff}</span>`:''}
      <button class="btn-sm" style="margin-left:auto" onclick="delWeight(${i})">×</button>
    </div>`;
  });
  html+=`</div>
    <div style="display:flex;gap:6px;margin-top:10px">
      <input type="number" id="w-input" placeholder="kg" step="0.1" style="width:80px">
      <button class="btn-primary" onclick="addWeight()">${t('addWeight')}</button>
    </div>
  </div></div>`;
  html+=`</div>`;
  el.innerHTML=html;
}

  const iTypes=t('iTypes');
  let html=`<div class="inv-summary">

      <div class="form-row single"><div><div class="form-label">${t('investName')}</div><input type="text" id="inv-name" placeholder="${t('investPH')}"></div></div>
      <div class="form-row three">
        <div><div class="form-label">${t('investAmt')}</div><input type="number" id="inv-cost" placeholder="0"></div>
        <div><div class="form-label">${t('investCurrent')}</div><input type="number" id="inv-cur" placeholder="0"></div>
        <div><div class="form-label">${t('investType')}</div><select id="inv-type">${iTypes.map((tp,i)=>`<option value="${i}">${tp}</option>`).join('')}</select></div>
      </div>
      <div class="form-row single"><div><div class="form-label">${t('investNote')}</div><input type="text" id="inv-note" placeholder="..."></div></div>
      <div class="btn-row"><button class="btn-primary" onclick="addInvest()">${t('addBtn')}</button><button class="btn-ghost" onclick="addInvestForm.show=false;renderInvest()">${t('cancelBtn')}</button></div>
    </div>`;
  } else {
    html+=`<button class="add-cat-btn" style="margin-top:10px" onclick="addInvestForm.show=true;renderInvest()">${t('addInvest')}</button>`;

  el.innerHTML=html;

  const el=document.getElementById('tab-export');
  if(!el)return;
  const weekSummary=buildExportText(false);
  const allSummary=buildExportText(true);
  el.innerHTML=`<div class="export-box">
    <div class="export-title">${t('exportWeek')}</div>
    <div class="export-preview" id="exp-week">${weekSummary}</div>
    <div style="display:flex;align-items:center;gap:8px">
      <button class="btn-primary" onclick="copyExport('exp-week')">${t('copyBtn')}</button>
      <span class="copy-badge" id="badge-week">${t('copiedMsg')}</span>
    </div>
  </div>
  <div class="export-box">
    <div class="export-title">${t('exportAll')}</div>
    <div class="export-preview" id="exp-all">${allSummary}</div>
    <div style="display:flex;align-items:center;gap:8px">
      <button class="btn-primary" onclick="copyExport('exp-all')">${t('copyBtn')}</button>
      <span class="copy-badge" id="badge-all">${t('copiedMsg')}</span>
    </div>
  </div>

function buildExportText(fullMode){
  const d=new Date();
  const header=lang==='th'
    ?`สรุปงาน ${fullMode?'ทั้งหมด':'ประจำสัปดาห์'} — ${d.toLocaleDateString('th-TH',{day:'numeric',month:'long',year:'numeric'})}`
    :`${fullMode?'Full':'Weekly'} Summary — ${d.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})}`;
  let txt=header+'\n'+'='.repeat(40)+'\n\n';
  Object.entries(data.sections).forEach(([key,sec])=>{
    const{d:done,t:tot}=getDone(sec);
    txt+=`[${secLabel(sec)}] ${done}/${tot}\n`;
    sec.categories.forEach(cat=>{
      const pending=cat.tasks.filter(tk=>!tk.done);
      const done2=cat.tasks.filter(tk=>tk.done);
      if(!fullMode&&!pending.length)return;
      txt+=`  ${catName(cat)}\n`;
      pending.forEach(tk=>{
        const dl=tk.deadline?` (${lang==='th'?'deadline':'due'}: ${tk.deadline})`:'';
        txt+=`    [ ] ${taskName(tk)}${dl}\n`;
      });
      if(fullMode) done2.forEach(tk=>{ txt+=`    [x] ${taskName(tk)}\n`; });
    });
    txt+='\n';
  });
  return txt;
}

function copyExport(id){
  const text=document.getElementById(id)?.textContent||'';
  navigator.clipboard.writeText(text).then(()=>{
    const badge=document.getElementById('badge-'+id.split('-')[1]);
    if(badge){badge.style.display='inline';setTimeout(()=>badge.style.display='none',2000);}
  });
}

/* health helpers */
function calcStreak(habitIdx){
  let streak=0;
  const d=new Date();
  for(let i=0;i<30;i++){
    const s=d.toISOString().split('T')[0];
    if(data.health.habitDays[s]&&data.health.habitDays[s][habitIdx])streak++;
    else break;
    d.setDate(d.getDate()-1);
  }
  return streak;
}
function toggleHabit(hi){
  const today=todayStr();
  if(!data.health.habitDays[today])data.health.habitDays[today]={};
  data.health.habitDays[today][hi]=!data.health.habitDays[today][hi];
  saveData();renderHealth();
}
function addWeight(){
  const v=parseFloat(document.getElementById('w-input')?.value||'');
  if(!v||v<20||v>200)return;
  data.health.weightLog.push({date:todayStr(),val:v});
  saveData();renderHealth();
}
function delWeight(i){data.health.weightLog.splice(i,1);saveData();renderHealth();}

/* invest */
function addInvest(){
  const name=document.getElementById('inv-name')?.value?.trim();
  if(!name)return;
  data.investments.push({id:mkid(),nameTh:name,nameEn:name,cost:+(document.getElementById('inv-cost')?.value||0),current:+(document.getElementById('inv-cur')?.value||0),type:+(document.getElementById('inv-type')?.value||0),note:document.getElementById('inv-note')?.value||''});
  addInvestForm.show=false;saveData();renderInvest();renderOverview();
}
function delInvest(i){data.investments.splice(i,1);saveData();renderInvest();renderOverview();}

/* learning */
function addLearnItem(){
  const name=document.getElementById('ln-name')?.value?.trim();
  if(!name)return;
  data.learning.push({id:mkid(),nameTh:name,nameEn:name,cat:+(document.getElementById('ln-cat')?.value||0),progress:+(document.getElementById('ln-prog')?.value||0),target:document.getElementById('ln-target')?.value||''});
  addLearnForm.show=false;saveData();renderLearn();renderOverview();
}
function delLearn(i){data.learning.splice(i,1);saveData();renderLearn();renderOverview();}
function updateLearnProg(i,val){
  data.learning[i].progress=+val;
  const wrap=document.querySelectorAll('.learn-item')[i];
  if(wrap){
    const bar=wrap.querySelector('.learn-prog');
    const lbl=wrap.querySelector('.learn-meta span');
    const span=wrap.querySelectorAll('span')[wrap.querySelectorAll('span').length-1];
    if(bar)bar.style.width=val+'%';
    if(lbl)lbl.textContent=val+'%';
    if(span)span.textContent=val+'%';
  }
  saveData();renderOverview();
}

/* tasks */
function toggleTask(key,ci,id){const tk=data.sections[key].categories[ci].tasks.find(t=>t.id===id);if(tk)tk.done=!tk.done;saveData();refreshAll();}
function deleteTask(key,ci,id){data.sections[key].categories[ci].tasks=data.sections[key].categories[ci].tasks.filter(t=>t.id!==id);saveData();refreshAll();}
function deleteCat(key,catId){data.sections[key].categories=data.sections[key].categories.filter(c=>c.id!==catId);saveData();refreshAll();}
function showTaskForm(fk){taskForms[fk]=true;renderSection(fk.split('_cat_')[0]);}
function hideTaskForm(fk){delete taskForms[fk];renderSection(fk.split('_cat_')[0]);}
function addTask(key,ci,fk){
  const nm=document.getElementById('nm_'+fk);
  if(!nm||!nm.value.trim())return;
  const name=nm.value.trim();
  const notEl=document.getElementById('nt_'+fk);
  data.sections[key].categories[ci].tasks.push({id:mkid(),nameTh:name,nameEn:name,priority:document.getElementById('pr_'+fk)?.value||'med',type:document.getElementById('tp_'+fk)?.value||'weekly',done:false,deadline:document.getElementById('dl_'+fk)?.value||'',note:notEl?.value||''});
  delete taskForms[fk];saveData();refreshAll();
}
function showCatForm(cfk){catForms[cfk]=true;const key=cfk.replace('catform_','');key==='self'?renderHealth():renderSection(key);}
function hideCatForm(cfk){delete catForms[cfk];const key=cfk.replace('catform_','');key==='self'?renderHealth():renderSection(key);}
function addCat(key,cfk){
  const nm=document.getElementById('cn_'+cfk);
  if(!nm||!nm.value.trim())return;
  const name=nm.value.trim();
  data.sections[key].categories.push({id:mkid(),nameTh:name,nameEn:name,tasks:[]});
  delete catForms[cfk];saveData();refreshAll();
}
function toggleNoteForm(nfk,key){noteForms[nfk]=!noteForms[nfk];key==='self'?renderHealth():renderSection(key);}
function saveNote(key,ci,id,nfk){
  const tk=data.sections[key].categories[ci].tasks.find(t=>t.id===id);
  const ta=document.getElementById('ta_'+nfk);
  if(tk&&ta)tk.note=ta.value.trim();
  delete noteForms[nfk];saveData();key==='self'?renderHealth():renderSection(key);
}
function setFilter(key,f){filterState[key]=f;key==='self'?renderHealth():renderSection(key);}

function refreshAll(){
  renderStats();renderUrgent();renderOverview();renderWeekly();
  Object.keys(data.sections).forEach(k=>{if(k!=='self')renderSection(k);});
  renderHealth();renderExport();
}

function switchTab(key){
  document.querySelectorAll('.section').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+key)?.classList.add('active');
  renderTabs();
  document.querySelectorAll('.tab').forEach((el,i)=>{
    el.classList.toggle('active',['overview','weekly','teaching','research','admin','invest','learn','self','export'][i]===key);
  });
}

function setLang(l){
  lang=l;
  document.querySelectorAll('.lang-btn').forEach((b,i)=>b.classList.toggle('active',['th','en'][i]===l));
  document.getElementById('app-title').textContent=t('appTitle');
  document.getElementById('app-subtitle').textContent=t('appSubtitle');
  renderAll();
}

loadData();
renderAll();
</script>
